<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700;900&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-display: 'Josefin Sans', sans-serif;
            --font-body: 'PT Sans', sans-serif;
        }
        body {
            font-family: var(--font-body);
            margin: 0;
            padding: 0;
            background: {{BG_COLOR}};
            width: 1080px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #capture-area {
            width: 1080px;
            height: 1080px;
            background-color: {{BG_COLOR}};
            color: {{TEXT_COLOR}};
            box-sizing: border-box;
            position: relative;
            padding: 60px;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 6px solid {{TEXT_COLOR}};
            padding-bottom: 30px;
            margin-bottom: 50px;
        }
        .logo {
            height: 80px;
            {{LOGO_FILTER}}
        }
        .date-info {
            text-align: right;
        }
        .prediccio-label {
            font-family: var(--font-body);
            font-size: 30px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .semafor-date {
            font-family: var(--font-display);
            font-size: 50px;
            font-weight: 900;
        }
        
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .alerta-bubble {
            border: 12px solid {{TEXT_COLOR}};
            border-radius: 50%;
            width: 550px;
            height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.05);
        }
        
        .alerta-level {
            font-family: var(--font-display);
            font-size: 45px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .alerta-pax {
            font-family: var(--font-display);
            font-size: 140px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -5px;
            margin: 20px 0;
        }
        
        .alerta-pax-label {
            font-family: var(--font-body);
            font-size: 30px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 50px;
        }
        
        .ships-count-box {
            font-family: var(--font-display);
        }
        .ships-label {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .ships-number {
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
        }
        
        .hashtags {
            text-align: right;
            font-family: var(--font-display);
            font-size: 30px;
            font-weight: 900;
            opacity: 0.6;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="capture-area">
        <div class="header">
            <img class="logo" src="{{LOGO_SRC}}" />
            <div class="date-info">
                <div class="prediccio-label">Avui</div>
                <div class="semafor-date">{{DATA_AVUI}}</div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="alerta-bubble">
                <div class="alerta-level">ALERTA {{NIVELL_ALERTA}}</div>
                <div class="alerta-pax">{{PAX_ESTIMATS}}</div>
                <div class="alerta-pax-label">Creueristes</div>
            </div>
        </div>

        <div class="footer">
            <div class="ships-count-box">
                <div class="ships-label">Vaixells a Port</div>
                <div class="ships-number">{{NUM_VAIXELLS}}</div>
            </div>
            <div class="hashtags">
                #StopCreuers<br>
                #DecreixementTurístic
            </div>
        </div>
    </div>
</body>
</html>
